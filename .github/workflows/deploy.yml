name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    env:
      POSTHOG_KEY: ${{ secrets.VITE_POSTHOG_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject PostHog key
        run: |
          test -n "$POSTHOG_KEY"
          sed -i "s|__POSTHOG_KEY__|$POSTHOG_KEY|g" index.html
          if grep -q "__POSTHOG_KEY__" index.html; then
            echo "PostHog key placeholder still present in index.html"
            exit 1
          fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
